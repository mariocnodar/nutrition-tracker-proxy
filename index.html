<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Nutrición">
  <meta name="theme-color" content="#ffffff">
  <title>Nutrition Tracker</title>
  <link rel="manifest" href="manifest.json">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Cabinet+Grotesk:wght@400;500;700;800;900&display=swap');
 
    :root {
      --bg: #f8f8f6;
      --surface: #ffffff;
      --surface2: #f0f0ee;
      --border: #e8e8e5;
      --text: #111111;
      --muted: #999999;
      --green: #16a34a;
      --protein: #2563eb;
      --carbs: #d97706;
      --fat: #dc2626;
      --cal: #16a34a;
    }
 
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
 
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Cabinet Grotesk', sans-serif;
      min-height: 100vh;
    }
 
    .tabs {
      display: flex;
      padding: 56px 20px 0;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }
 
    .tab {
      flex: 1;
      padding: 12px 4px;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
 
    .tab.active { color: var(--text); border-bottom-color: var(--text); }
 
    .view { display: none; padding-bottom: 50px; }
    .view.active { display: block; }
 
    /* NAV BAR */
    .nav-bar {
      display: flex;
      align-items: center;
      padding: 14px 20px 12px;
      background: var(--surface);
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }
 
    .nav-bar button {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
 
    .nav-bar button:active { transform: scale(0.92); }
 
    .nav-label {
      flex: 1;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
 
    .nav-label.today { color: var(--green); font-weight: 500; }
 
    .refresh-btn { flex-shrink: 0; }
    .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
 
    /* SUMMARY CARD */
    .summary-card {
      margin: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }
 
    .cal-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 16px;
    }
 
    .cal-left {}
 
    .cal-display {
      display: flex;
      align-items: baseline;
      gap: 5px;
    }
 
    .cal-number {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: -3px;
      color: var(--cal);
      line-height: 1;
    }
 
    .cal-unit {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }
 
    .cal-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }
 
    .cal-target {
      text-align: right;
    }
 
    .cal-target-number {
      font-size: 14px;
      font-weight: 800;
      color: var(--muted);
    }
 
    .cal-target-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
    }
 
    /* CAL PROGRESS BAR */
    .cal-bar {
      height: 6px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 18px;
    }
 
    .cal-bar-fill {
      height: 100%;
      background: var(--cal);
      border-radius: 4px;
      transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
 
    .cal-bar-fill.over { background: var(--fat); }
 
    /* MACROS */
    .macros { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
 
    .macro-item { display: flex; flex-direction: column; gap: 4px; }
 
    .macro-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
 
    .macro-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
 
    .macro-target-text {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      color: var(--muted);
    }
 
    .macro-value {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.5px;
      line-height: 1;
    }
 
    .macro-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
 
    .macro-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
 
    .macro-item.protein .macro-label,
    .macro-item.protein .macro-value { color: var(--protein); }
    .macro-item.protein .macro-bar-fill { background: var(--protein); }
 
    .macro-item.carbs .macro-label,
    .macro-item.carbs .macro-value { color: var(--carbs); }
    .macro-item.carbs .macro-bar-fill { background: var(--carbs); }
 
    .macro-item.fat .macro-label,
    .macro-item.fat .macro-value { color: var(--fat); }
    .macro-item.fat .macro-bar-fill { background: var(--fat); }
 
    .macro-progress-text {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--muted);
    }
 
    /* ENTRIES */
    .section-title {
      padding: 4px 20px 10px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }
 
    .entry-count {
      background: var(--surface2);
      border-radius: 20px;
      padding: 2px 8px;
    }
 
    .entries { padding: 0 20px; display: flex; flex-direction: column; gap: 8px; }
 
    .entry-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
 
    .entry-left { flex: 1; min-width: 0; }
 
    .entry-name {
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }
 
    .entry-macros-row { display: flex; gap: 10px; }
 
    .entry-macro {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }
 
    .entry-macro.p span { color: var(--protein); font-weight: 500; }
    .entry-macro.c span { color: var(--carbs); font-weight: 500; }
    .entry-macro.f span { color: var(--fat); font-weight: 500; }
 
    .entry-cal { text-align: right; flex-shrink: 0; margin-left: 12px; }
 
    .entry-cal-number {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -1px;
      color: var(--cal);
      line-height: 1;
    }
 
    .entry-cal-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
    }
 
    /* ===== WEEKLY ===== */
    .week-summary {
      margin: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
 
    .week-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
    }
 
    .week-header-title {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 12px;
    }
 
    .week-totals {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 8px;
    }
 
    .week-total-item { text-align: center; }
 
    .week-total-value {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.5px;
      line-height: 1;
    }
 
    .week-total-target {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      color: var(--muted);
      margin-top: 1px;
    }
 
    .week-total-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 2px;
    }
 
    .week-total-item.cal .week-total-value { color: var(--cal); }
    .week-total-item.prot .week-total-value { color: var(--protein); }
    .week-total-item.carb .week-total-value { color: var(--carbs); }
    .week-total-item.fat .week-total-value { color: var(--fat); }
 
    .day-bars { padding: 14px 20px; }
 
    .day-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
 
    .day-bar-row:last-child { margin-bottom: 0; }
 
    .day-bar-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      width: 28px;
      flex-shrink: 0;
    }
 
    .day-bar-label.today-label { color: var(--green); font-weight: 500; }
 
    .day-bar-track {
      flex: 1;
      height: 26px;
      background: var(--bg);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }
 
    /* target line */
    .day-bar-target-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: rgba(0,0,0,0.15);
      z-index: 2;
    }
 
    .day-bar-fill {
      height: 100%;
      border-radius: 6px;
      display: flex;
      align-items: center;
      padding-left: 8px;
      transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
 
    .day-bar-text {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: white;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s 0.5s;
    }
 
    .day-bar-fill.show .day-bar-text { opacity: 1; }
 
    .day-bar-prot {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text);
      width: 44px;
      text-align: right;
      flex-shrink: 0;
    }
 
    .section-label {
      padding: 4px 20px 10px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
    }
 
    .macro-week-grid {
      margin: 0 20px 16px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
 
    .macro-week-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 12px;
    }
 
    .macro-week-title {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
 
    .macro-week-avg {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.5px;
      line-height: 1;
    }
 
    .macro-week-target {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      margin-top: 2px;
    }
 
    .macro-week-card.prot .macro-week-title,
    .macro-week-card.prot .macro-week-avg { color: var(--protein); }
    .macro-week-card.carb .macro-week-title,
    .macro-week-card.carb .macro-week-avg { color: var(--carbs); }
    .macro-week-card.fat .macro-week-title,
    .macro-week-card.fat .macro-week-avg { color: var(--fat); }
 
    /* ===== SETTINGS ===== */
    .settings-wrap { padding: 16px 20px 40px; }
 
    .settings-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
    }
 
    .settings-section-title {
      padding: 14px 16px 10px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
 
    .settings-row {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
 
    .settings-row:last-child { border-bottom: none; }
 
    .settings-row-label {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
    }
 
    .settings-row-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
      font-family: 'DM Mono', monospace;
    }
 
    .settings-input {
      width: 80px;
      text-align: right;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Cabinet Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 700;
      background: var(--bg);
      color: var(--text);
      outline: none;
    }
 
    .settings-input:focus { border-color: var(--text); }
 
    .settings-select {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Cabinet Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      background: var(--bg);
      color: var(--text);
      outline: none;
      cursor: pointer;
    }
 
    /* OBJETIVOS RESULT */
    .goals-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
 
    .goals-title {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 14px;
    }
 
    .goals-cal {
      display: flex;
      align-items: baseline;
      gap: 5px;
      margin-bottom: 4px;
    }
 
    .goals-cal-number {
      font-size: 40px;
      font-weight: 900;
      letter-spacing: -2px;
      color: var(--cal);
      line-height: 1;
    }
 
    .goals-cal-unit {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }
 
    .goals-cal-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 16px;
    }
 
    .goals-macros {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
 
    .goals-macro {
      background: var(--bg);
      border-radius: 10px;
      padding: 12px 10px;
      text-align: center;
    }
 
    .goals-macro-value {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.5px;
      line-height: 1;
    }
 
    .goals-macro-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 3px;
    }
 
    .goals-macro.prot .goals-macro-value { color: var(--protein); }
    .goals-macro.carb .goals-macro-value { color: var(--carbs); }
    .goals-macro.fat .goals-macro-value { color: var(--fat); }
 
    .save-btn {
      width: 100%;
      padding: 14px;
      background: var(--text);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Cabinet Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.15s;
    }
 
    .save-btn:active { transform: scale(0.98); opacity: 0.9; }
 
    .save-confirm {
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--green);
      padding: 8px;
      display: none;
    }
 
    /* EMPTY / LOADING / ERROR */
    .empty { text-align: center; padding: 50px 20px; color: var(--muted); }
    .empty-icon { font-size: 36px; margin-bottom: 10px; }
    .empty-text { font-size: 13px; font-family: 'DM Mono', monospace; }
 
    .loading { display: flex; justify-content: center; padding: 40px; }
    .loading-dots { display: flex; gap: 6px; }
    .loading-dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text);
      animation: bounce 1.2s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.2; }
      40% { transform: scale(1); opacity: 1; }
    }
 
    .error-msg {
      margin: 0 20px;
      padding: 14px 16px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 12px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: #dc2626;
    }
  </style>
</head>
<body>
 
<div class="tabs">
  <div class="tab active" onclick="switchTab('daily')">Hoy</div>
  <div class="tab" onclick="switchTab('weekly')">Semana</div>
  <div class="tab" onclick="switchTab('settings')">Ajustes</div>
</div>
 
<!-- ===== DAILY ===== -->
<div class="view active" id="view-daily">
  <div class="nav-bar">
    <button onclick="changeDay(-1)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="nav-label today" id="dateDisplay" onclick="goToday()"></div>
    <button onclick="changeDay(1)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
    </button>
    <button class="refresh-btn" id="refreshBtn" onclick="loadDaily()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
      </svg>
    </button>
  </div>
 
  <div class="summary-card">
    <div class="cal-row">
      <div class="cal-left">
        <div class="cal-display">
          <div class="cal-number" id="totalCal">0</div>
          <div class="cal-unit">kcal</div>
        </div>
        <div class="cal-label">calorías del día</div>
      </div>
      <div class="cal-target" id="calTargetDisplay"></div>
    </div>
    <div class="cal-bar"><div class="cal-bar-fill" id="calBar" style="width:0%"></div></div>
    <div class="macros">
      <div class="macro-item protein">
        <div class="macro-header">
          <div class="macro-label">Proteínas</div>
          <div class="macro-target-text" id="protTarget"></div>
        </div>
        <div class="macro-value" id="totalProt">0</div>
        <div class="macro-progress-text" id="protProgress"></div>
        <div class="macro-bar"><div class="macro-bar-fill" id="protBar" style="width:0%"></div></div>
      </div>
      <div class="macro-item carbs">
        <div class="macro-header">
          <div class="macro-label">Carbos</div>
          <div class="macro-target-text" id="carbTarget"></div>
        </div>
        <div class="macro-value" id="totalCarb">0</div>
        <div class="macro-progress-text" id="carbProgress"></div>
        <div class="macro-bar"><div class="macro-bar-fill" id="carbBar" style="width:0%"></div></div>
      </div>
      <div class="macro-item fat">
        <div class="macro-header">
          <div class="macro-label">Grasas</div>
          <div class="macro-target-text" id="fatTarget"></div>
        </div>
        <div class="macro-value" id="totalFat">0</div>
        <div class="macro-progress-text" id="fatProgress"></div>
        <div class="macro-bar"><div class="macro-bar-fill" id="fatBar" style="width:0%"></div></div>
      </div>
    </div>
  </div>
 
  <div class="section-title">
    <span>Entradas</span>
    <span class="entry-count" id="entryCount">0</span>
  </div>
  <div id="daily-content" class="entries"></div>
</div>
 
<!-- ===== WEEKLY ===== -->
<div class="view" id="view-weekly">
  <div class="nav-bar">
    <button onclick="changeWeek(-1)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="nav-label" id="weekDisplay"></div>
    <button onclick="changeWeek(1)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
    </button>
    <button class="refresh-btn" id="weekRefreshBtn" onclick="loadWeekly()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
      </svg>
    </button>
  </div>
  <div id="weekly-content"></div>
</div>
 
<!-- ===== SETTINGS ===== -->
<div class="view" id="view-settings">
  <div class="settings-wrap">
 
    <div id="goals-card-wrap"></div>
 
    <div class="settings-section">
      <div class="settings-section-title">Tu cuerpo</div>
      <div class="settings-row">
        <div class="settings-row-label">Peso<div class="settings-row-sub">kg</div></div>
        <input class="settings-input" type="number" id="s-weight" placeholder="75" oninput="recalcGoals()">
      </div>
      <div class="settings-row">
        <div class="settings-row-label">Altura<div class="settings-row-sub">cm</div></div>
        <input class="settings-input" type="number" id="s-height" placeholder="175" oninput="recalcGoals()">
      </div>
      <div class="settings-row">
        <div class="settings-row-label">Edad<div class="settings-row-sub">años</div></div>
        <input class="settings-input" type="number" id="s-age" placeholder="30" oninput="recalcGoals()">
      </div>
      <div class="settings-row">
        <div class="settings-row-label">Sexo</div>
        <select class="settings-select" id="s-sex" onchange="recalcGoals()">
          <option value="m">Hombre</option>
          <option value="f">Mujer</option>
        </select>
      </div>
    </div>
 
    <div class="settings-section">
      <div class="settings-section-title">Actividad y objetivo</div>
      <div class="settings-row">
        <div class="settings-row-label">Actividad<div class="settings-row-sub">nivel general</div></div>
        <select class="settings-select" id="s-activity" onchange="recalcGoals()">
          <option value="1.2">Sedentario</option>
          <option value="1.375">Ligero (1-3 días/sem)</option>
          <option value="1.55" selected>Moderado (3-5 días)</option>
          <option value="1.725">Activo (6-7 días)</option>
          <option value="1.9">Muy activo</option>
        </select>
      </div>
      <div class="settings-row">
        <div class="settings-row-label">Objetivo</div>
        <select class="settings-select" id="s-goal" onchange="recalcGoals()">
          <option value="cut">Perder grasa</option>
          <option value="maintain" selected>Mantener</option>
          <option value="bulk">Ganar músculo</option>
        </select>
      </div>
    </div>
 
    <button class="save-btn" onclick="saveSettings()">Guardar objetivos</button>
    <div class="save-confirm" id="saveConfirm">✓ Objetivos guardados</div>
 
  </div>
</div>
 
<script>
  const PROXY_URL = 'https://nutrition-tracker-proxy.vercel.app/api/notion';
 
  let currentDate = new Date();
  let currentWeekOffset = 0;
  let goals = { cal: 0, prot: 0, carb: 0, fat: 0 };
 
  // ===== STORAGE =====
  function loadSettings() {
    try {
      const s = JSON.parse(localStorage.getItem('nutrition_settings') || '{}');
      if (s.weight) document.getElementById('s-weight').value = s.weight;
      if (s.height) document.getElementById('s-height').value = s.height;
      if (s.age) document.getElementById('s-age').value = s.age;
      if (s.sex) document.getElementById('s-sex').value = s.sex;
      if (s.activity) document.getElementById('s-activity').value = s.activity;
      if (s.goal) document.getElementById('s-goal').value = s.goal;
      if (s.goals) goals = s.goals;
    } catch(e) {}
  }
 
  function saveSettings() {
    const s = getSettingsValues();
    s.goals = goals;
    localStorage.setItem('nutrition_settings', JSON.stringify(s));
    const c = document.getElementById('saveConfirm');
    c.style.display = 'block';
    setTimeout(() => { c.style.display = 'none'; }, 2000);
  }
 
  function getSettingsValues() {
    return {
      weight: parseFloat(document.getElementById('s-weight').value) || 0,
      height: parseFloat(document.getElementById('s-height').value) || 0,
      age: parseFloat(document.getElementById('s-age').value) || 0,
      sex: document.getElementById('s-sex').value,
      activity: parseFloat(document.getElementById('s-activity').value),
      goal: document.getElementById('s-goal').value
    };
  }
 
  // ===== GOALS CALC =====
  function recalcGoals() {
    const s = getSettingsValues();
    if (!s.weight || !s.height || !s.age) {
      document.getElementById('goals-card-wrap').innerHTML = '';
      return;
    }
 
    // Mifflin-St Jeor BMR
    let bmr;
    if (s.sex === 'm') {
      bmr = 10 * s.weight + 6.25 * s.height - 5 * s.age + 5;
    } else {
      bmr = 10 * s.weight + 6.25 * s.height - 5 * s.age - 161;
    }
 
    let tdee = bmr * s.activity;
 
    // Adjust for goal
    let targetCal;
    if (s.goal === 'cut') targetCal = Math.round(tdee * 0.8);
    else if (s.goal === 'bulk') targetCal = Math.round(tdee * 1.1);
    else targetCal = Math.round(tdee);
 
    // Macros
    let protG, fatG, carbG;
    if (s.goal === 'cut') {
      protG = Math.round(s.weight * 2.2);   // alto en proteína para preservar músculo
      fatG = Math.round(s.weight * 0.9);
      carbG = Math.round((targetCal - protG * 4 - fatG * 9) / 4);
    } else if (s.goal === 'bulk') {
      protG = Math.round(s.weight * 2.0);
      fatG = Math.round(s.weight * 1.0);
      carbG = Math.round((targetCal - protG * 4 - fatG * 9) / 4);
    } else {
      protG = Math.round(s.weight * 1.8);
      fatG = Math.round(s.weight * 0.9);
      carbG = Math.round((targetCal - protG * 4 - fatG * 9) / 4);
    }
 
    carbG = Math.max(carbG, 50);
 
    goals = { cal: targetCal, prot: protG, carb: carbG, fat: fatG };
 
    // Render goals card
    const goalLabels = { cut: 'Perder grasa', maintain: 'Mantener', bulk: 'Ganar músculo' };
    document.getElementById('goals-card-wrap').innerHTML = `
      <div class="goals-card">
        <div class="goals-title">Tus objetivos diarios · ${goalLabels[s.goal]}</div>
        <div class="goals-cal">
          <div class="goals-cal-number">${targetCal}</div>
          <div class="goals-cal-unit">kcal/día</div>
        </div>
        <div class="goals-cal-label">TDEE: ${Math.round(tdee)} kcal · BMR: ${Math.round(bmr)} kcal</div>
        <div class="goals-macros">
          <div class="goals-macro prot">
            <div class="goals-macro-value">${protG}g</div>
            <div class="goals-macro-label">Proteínas</div>
          </div>
          <div class="goals-macro carb">
            <div class="goals-macro-value">${carbG}g</div>
            <div class="goals-macro-label">Carbos</div>
          </div>
          <div class="goals-macro fat">
            <div class="goals-macro-value">${fatG}g</div>
            <div class="goals-macro-label">Grasas</div>
          </div>
        </div>
      </div>`;
  }
 
  // ===== TABS =====
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['daily','weekly','settings'][i] === tab);
    });
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + tab).classList.add('active');
    if (tab === 'weekly') loadWeekly();
    if (tab === 'settings') recalcGoals();
  }
 
  // ===== UTILS =====
  function formatDateISO(date) { return date.toISOString().split('T')[0]; }
  function isToday(date) { return formatDateISO(date) === formatDateISO(new Date()); }
 
  function getProp(props, name) {
    const p = props[name];
    if (!p) return 0;
    if (p.type === 'number') return p.number || 0;
    if (p.type === 'title') return p.title?.[0]?.plain_text || '';
    if (p.type === 'date') return p.date?.start || '';
    return 0;
  }
 
  function animateNumber(id, target) {
    const el = document.getElementById(id);
    if (!el) return;
    const duration = 500;
    const start = performance.now();
    function update(now) {
      const p = Math.min((now - start) / duration, 1);
      const e = 1 - Math.pow(1 - p, 3);
      el.textContent = Math.round(target * e);
      if (p < 1) requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
  }
 
  function updateTargetUI() {
    if (!goals.cal) {
      document.getElementById('calTargetDisplay').innerHTML = '';
      ['protTarget','carbTarget','fatTarget'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = '';
      });
      return;
    }
    document.getElementById('calTargetDisplay').innerHTML = `
      <div class="cal-target-number">/ ${goals.cal}</div>
      <div class="cal-target-label">objetivo</div>`;
    document.getElementById('protTarget').textContent = `/ ${goals.prot}g`;
    document.getElementById('carbTarget').textContent = `/ ${goals.carb}g`;
    document.getElementById('fatTarget').textContent = `/ ${goals.fat}g`;
  }
 
  // ===== DAILY =====
  function updateDateUI() {
    const el = document.getElementById('dateDisplay');
    if (isToday(currentDate)) {
      el.textContent = 'Hoy';
      el.className = 'nav-label today';
    } else {
      el.textContent = currentDate.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short' });
      el.className = 'nav-label';
    }
  }
 
  function changeDay(d) {
    currentDate = new Date(currentDate);
    currentDate.setDate(currentDate.getDate() + d);
    updateDateUI();
    loadDaily();
  }
 
  function goToday() { currentDate = new Date(); updateDateUI(); loadDaily(); }
 
  async function loadDaily() {
    const content = document.getElementById('daily-content');
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    content.innerHTML = '<div class="loading"><div class="loading-dots"><span></span><span></span><span></span></div></div>';
    updateTargetUI();
 
    ['totalCal','totalProt','totalCarb','totalFat'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.textContent = '0';
    });
    ['calBar','protBar','carbBar','fatBar'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.width = '0%';
    });
    ['protProgress','carbProgress','fatProgress'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.textContent = '';
    });
    document.getElementById('entryCount').textContent = '0';
 
    try {
      const res = await fetch(PROXY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          filter: { property: 'Fecha', date: { equals: formatDateISO(currentDate) } },
          sorts: [{ property: 'Fecha', direction: 'ascending' }]
        })
      });
      if (!res.ok) throw new Error(`Error ${res.status}`);
      const data = await res.json();
      renderDaily(data.results || []);
    } catch (err) {
      content.innerHTML = `<div class="error-msg">Error: ${err.message}</div>`;
    } finally {
      btn.classList.remove('spinning');
    }
  }
 
  function renderDaily(entries) {
    const content = document.getElementById('daily-content');
 
    if (!entries.length) {
      content.innerHTML = `<div class="empty"><div class="empty-icon">🍽️</div><div class="empty-text">Sin registros</div></div>`;
      return;
    }
 
    let tCal = 0, tProt = 0, tCarb = 0, tFat = 0;
 
    const html = entries.map(e => {
      const p = e.properties;
      const name = getProp(p, 'Concepto') || 'Sin nombre';
      const cal = getProp(p, 'Calorías') || getProp(p, 'Calorias') || 0;
      const prot = getProp(p, 'Proteínas') || getProp(p, 'Proteinas') || 0;
      const carb = getProp(p, 'Carbohidratos') || 0;
      const fat = getProp(p, 'Grasas') || 0;
      tCal += cal; tProt += prot; tCarb += carb; tFat += fat;
      return `<div class="entry-card">
        <div class="entry-left">
          <div class="entry-name">${name}</div>
          <div class="entry-macros-row">
            <div class="entry-macro p"><span>${Math.round(prot)}g</span> prot</div>
            <div class="entry-macro c"><span>${Math.round(carb)}g</span> carbs</div>
            <div class="entry-macro f"><span>${Math.round(fat)}g</span> grasas</div>
          </div>
        </div>
        <div class="entry-cal">
          <div class="entry-cal-number">${Math.round(cal)}</div>
          <div class="entry-cal-label">kcal</div>
        </div>
      </div>`;
    }).join('');
 
    content.innerHTML = html;
    document.getElementById('entryCount').textContent = entries.length;
 
    animateNumber('totalCal', Math.round(tCal));
    animateNumber('totalProt', Math.round(tProt));
    animateNumber('totalCarb', Math.round(tCarb));
    animateNumber('totalFat', Math.round(tFat));
 
    setTimeout(() => {
      if (goals.cal) {
        const calPct = Math.min((tCal / goals.cal) * 100, 100);
        const calBar = document.getElementById('calBar');
        calBar.style.width = calPct + '%';
        calBar.className = 'cal-bar-fill' + (tCal > goals.cal ? ' over' : '');
 
        const protPct = Math.min((tProt / goals.prot) * 100, 100);
        const carbPct = Math.min((tCarb / goals.carb) * 100, 100);
        const fatPct = Math.min((tFat / goals.fat) * 100, 100);
 
        document.getElementById('protBar').style.width = protPct + '%';
        document.getElementById('carbBar').style.width = carbPct + '%';
        document.getElementById('fatBar').style.width = fatPct + '%';
 
        document.getElementById('protProgress').textContent = `${Math.round(tProt)}g / ${goals.prot}g`;
        document.getElementById('carbProgress').textContent = `${Math.round(tCarb)}g / ${goals.carb}g`;
        document.getElementById('fatProgress').textContent = `${Math.round(tFat)}g / ${goals.fat}g`;
      } else {
        document.getElementById('protBar').style.width = Math.min((tProt / 150) * 100, 100) + '%';
        document.getElementById('carbBar').style.width = Math.min((tCarb / 250) * 100, 100) + '%';
        document.getElementById('fatBar').style.width = Math.min((tFat / 65) * 100, 100) + '%';
      }
    }, 100);
  }
 
  // ===== WEEKLY =====
  function getWeekDates(offset = 0) {
    const today = new Date();
    const day = today.getDay();
    const monday = new Date(today);
    monday.setDate(today.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
    return Array.from({ length: 7 }, (_, i) => {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      return d;
    });
  }
 
  function updateWeekUI() {
    const days = getWeekDates(currentWeekOffset);
    const s = days[0].toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
    const e = days[6].toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
    document.getElementById('weekDisplay').textContent = `${s} – ${e}`;
  }
 
  function changeWeek(d) { currentWeekOffset += d; updateWeekUI(); loadWeekly(); }
 
  async function loadWeekly() {
    updateWeekUI();
    const content = document.getElementById('weekly-content');
    const btn = document.getElementById('weekRefreshBtn');
    btn.classList.add('spinning');
    content.innerHTML = '<div class="loading"><div class="loading-dots"><span></span><span></span><span></span></div></div>';
 
    const days = getWeekDates(currentWeekOffset);
 
    try {
      const res = await fetch(PROXY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          filter: {
            and: [
              { property: 'Fecha', date: { on_or_after: formatDateISO(days[0]) } },
              { property: 'Fecha', date: { on_or_before: formatDateISO(days[6]) } }
            ]
          },
          sorts: [{ property: 'Fecha', direction: 'ascending' }]
        })
      });
      if (!res.ok) throw new Error(`Error ${res.status}`);
      const data = await res.json();
      renderWeekly(data.results || [], days);
    } catch (err) {
      content.innerHTML = `<div class="error-msg">Error: ${err.message}</div>`;
    } finally {
      btn.classList.remove('spinning');
    }
  }
 
  function renderWeekly(entries, days) {
    const content = document.getElementById('weekly-content');
    const todayISO = formatDateISO(new Date());
    const DAY_NAMES = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
 
    const byDay = {};
    days.forEach(d => { byDay[formatDateISO(d)] = { cal: 0, prot: 0, carb: 0, fat: 0 }; });
 
    entries.forEach(e => {
      const p = e.properties;
      const fecha = getProp(p, 'Fecha');
      const key = fecha ? fecha.split('T')[0] : null;
      if (key && byDay[key]) {
        byDay[key].cal += getProp(p, 'Calorías') || getProp(p, 'Calorias') || 0;
        byDay[key].prot += getProp(p, 'Proteínas') || getProp(p, 'Proteinas') || 0;
        byDay[key].carb += getProp(p, 'Carbohidratos') || 0;
        byDay[key].fat += getProp(p, 'Grasas') || 0;
      }
    });
 
    const vals = Object.values(byDay);
    const daysWithData = vals.filter(d => d.cal > 0);
    const count = daysWithData.length || 1;
    const tCal = vals.reduce((a,b) => a+b.cal, 0);
    const tProt = vals.reduce((a,b) => a+b.prot, 0);
    const tCarb = vals.reduce((a,b) => a+b.carb, 0);
    const tFat = vals.reduce((a,b) => a+b.fat, 0);
    const avgCal = Math.round(tCal / count);
    const avgProt = Math.round(tProt / count);
    const avgCarb = Math.round(tCarb / count);
    const avgFat = Math.round(tFat / count);
 
    const maxCal = Math.max(...vals.map(d => d.cal), goals.cal || 1, 1);
 
    // Target line pct
    const targetLinePct = goals.cal ? Math.min((goals.cal / (maxCal * 1.1)) * 100, 95) : null;
 
    const barsHTML = days.map((day, i) => {
      const iso = formatDateISO(day);
      const d = byDay[iso];
      const pct = (d.cal / (maxCal * 1.1)) * 100;
      const isT = iso === todayISO;
      const color = d.cal > (goals.cal || 99999) ? '#dc2626' : (isT ? '#16a34a' : '#1a1a1a');
      const targetLine = targetLinePct ? `<div class="day-bar-target-line" style="left:${targetLinePct}%"></div>` : '';
 
      return `<div class="day-bar-row">
        <div class="day-bar-label ${isT ? 'today-label' : ''}">${DAY_NAMES[i]}</div>
        <div class="day-bar-track">
          ${targetLine}
          <div class="day-bar-fill ${d.cal > 0 ? 'show' : ''}" style="width:${pct}%;background:${color}">
            <span class="day-bar-text">${d.cal > 0 ? Math.round(d.cal) + ' kcal' : ''}</span>
          </div>
        </div>
        <div class="day-bar-prot">${d.prot > 0 ? Math.round(d.prot) + 'g' : '—'}</div>
      </div>`;
    }).join('');
 
    const calTargetText = goals.cal ? `/ ${goals.cal}` : '';
    const protTargetText = goals.prot ? `/ ${goals.prot}g obj` : 'total';
    const carbTargetText = goals.carb ? `/ ${goals.carb}g obj` : 'total';
    const fatTargetText = goals.fat ? `/ ${goals.fat}g obj` : 'total';
 
    content.innerHTML = `
      <div class="week-summary">
        <div class="week-header">
          <div class="week-header-title">Media diaria · ${count} días con datos</div>
          <div class="week-totals">
            <div class="week-total-item cal">
              <div class="week-total-value">${avgCal}</div>
              <div class="week-total-target">${calTargetText}</div>
              <div class="week-total-label">kcal</div>
            </div>
            <div class="week-total-item prot">
              <div class="week-total-value">${avgProt}g</div>
              <div class="week-total-target">${goals.prot ? '/ ' + goals.prot + 'g' : ''}</div>
              <div class="week-total-label">prot</div>
            </div>
            <div class="week-total-item carb">
              <div class="week-total-value">${avgCarb}g</div>
              <div class="week-total-target">${goals.carb ? '/ ' + goals.carb + 'g' : ''}</div>
              <div class="week-total-label">carbs</div>
            </div>
            <div class="week-total-item fat">
              <div class="week-total-value">${avgFat}g</div>
              <div class="week-total-target">${goals.fat ? '/ ' + goals.fat + 'g' : ''}</div>
              <div class="week-total-label">grasas</div>
            </div>
          </div>
        </div>
        <div class="day-bars">${barsHTML}</div>
      </div>
 
      <div class="section-label">Totales semanales</div>
      <div class="macro-week-grid">
        <div class="macro-week-card prot">
          <div class="macro-week-title">Proteínas</div>
          <div class="macro-week-avg">${Math.round(tProt)}g</div>
          <div class="macro-week-target">${protTargetText}</div>
        </div>
        <div class="macro-week-card carb">
          <div class="macro-week-title">Carbos</div>
          <div class="macro-week-avg">${Math.round(tCarb)}g</div>
          <div class="macro-week-target">${carbTargetText}</div>
        </div>
        <div class="macro-week-card fat">
          <div class="macro-week-title">Grasas</div>
          <div class="macro-week-avg">${Math.round(tFat)}g</div>
          <div class="macro-week-target">${fatTargetText}</div>
        </div>
      </div>`;
  }
 
  // ===== INIT =====
  loadSettings();
  recalcGoals();
  updateDateUI();
  loadDaily();
</script>
</body>
</html>
